<!DOCTYPE html>

        /* ================================================
           ESTILOS BÁSICOS DEL TABLERO DE LUDO
           ================================================ */
        
        /* Centramos todo en la página con un fondo agradable */
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #2d6a4f;      /* Fondo verde oscuro */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        /* Contenedor principal del tablero */
        .tablero-ludo {
            background-color: #d4a373;       /* Borde marrón como madera */
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: inline-block;
        }
        
        /* 
            El tablero se construye con una tabla HTML normal.
            Cada celda (td) tiene un tamaño fijo y es cuadrada.
        */
        table {
            border-collapse: collapse;        /* Sin espacios entre celdas */
            background-color: #f5e7d3;       /* Color base del tablero (beige) */
            margin: 0 auto;
        }
        
        /* Cada celda del tablero: cuadrada de 40x40 píxeles */
        td {
            width: 40px;
            height: 40px;
            text-align: center;
            vertical-align: middle;
            font-size: 18px;
            font-weight: bold;
            border: 1px solid #c9a87b;       /* Borde sutil entre casillas */
        }
        
        /* ================================================
           CLASES DE COLORES PARA CADA ZONA DEL TABLERO
           ================================================ */
        
        /* Casillas del camino ROJO (esquina superior derecha) */
        .rojo {
            background-color: #ff8a80;
        }
        
        /* Casillas del camino VERDE (esquina superior izquierda) */
        .verde {
            background-color: #a5d6a7;
        }
        
        /* Casillas del camino AMARILLO (esquina inferior izquierda) */
        .amarillo {
            background-color: #fff59d;
        }
        
        /* Casillas del camino AZUL (esquina inferior derecha) */
        .azul {
            background-color: #90caf9;
        }
        
        /* Casillas ESPECIALES (estrella/seguro) - fondo naranja con estrella */
        .estrella {
            background-color: #ffb74d;
            position: relative;
        }
        
        /* Agregamos una estrella con CSS puro */
        .estrella::after {
            content: "★";
            color: #e65100;
            font-size: 22px;
        }
        
        /* Zona de META (llegada) de cada color - camino hacia el centro */
        .meta-rojo {
            background-color: #e53935;
        }
        .meta-verde {
            background-color: #43a047;
        }
        .meta-amarillo {
            background-color: #fdd835;
        }
        .meta-azul {
            background-color: #1e88e5;
        }
        
        /* Zona CENTRAL del tablero (donde terminan todos) */
        .centro {
            background-color: #ffd966;
            font-size: 24px;
            color: #b65f00;
        }
        
        /* Zonas de SALIDA (HOME) donde se colocan las fichas al inicio */
        .home-rojo {
            background-color: #c62828;
            color: white;
        }
        .home-verde {
            background-color: #2e7d32;
            color: white;
        }
        .home-amarillo {
            background-color: #f9a825;
            color: #4a2c00;
        }
        .home-azul {
            background-color: #1565c0;
            color: white;
        }
        
        /* Casilla de inicio del camino (salida desde el home) */
        .salida {
            background-color: #bcaaa4;
            font-weight: bold;
        }
        
        /* ================================================
           RESPONSIVE: en pantallas pequeñas reducimos tamaño
           ================================================ */
        @media (max-width: 700px) {
            td {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .estrella::after {
                font-size: 16px;
            }
            .centro {
                font-size: 16px;
            }
        }
        
        @media (max-width: 500px) {
            td {
                width: 22px;
                height: 22px;
                font-size: 9px;
            }
            .estrella::after {
                font-size: 12px;
            }
        }
        
        /* Pie de página explicativo */
        .info {
            text-align: center;
            margin-top: 20px;
            color: #f1f8e9;
            font-family: Arial;
            font-weight: bold;
            background-color: #1b4332;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
            width: auto;
        }
    </style>

           - El color del camino (rojo, verde, amarillo, azul)
           - Si es zona de inicio (home-*)
           - Si es casilla especial estrella (segura)
           - Si es la meta (meta-*)
           - El centro del tablero
           - Las casillas de salida desde cada home
        
        3. Las clases están en el <style> y son muy fáciles de modificar:
           - Cambiar colores: modificar background-color
           - Cambiar tamaño: modificar width/height de td
        
        4. El diseño es completamente responsive: en móviles se reduce el tamaño.
        
        5. Este código NO usa JavaScript, solo HTML y CSS puro.
           Es perfecto para aprender cómo se estructura un tablero de Ludo.
        
        6. Los caminos siguen la disposición clásica:
           - Verde: esquina superior izquierda
           - Rojo: esquina superior derecha
           - Amarillo: esquina inferior izquierda
           - Azul: esquina inferior derecha
           - Cada color tiene su "home" (4 casillas) y su "meta" (camino al centro)
           - Las estrellas son casillas seguras donde no te pueden comer
           - El centro es la meta final (casilla con bandera 🏁)
